<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to RiskLens-AI — AI-Powered Stock Analysis Platform">
  <title>Log In — RiskLens-AI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📈</text></svg>">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .auth-page {
      width: 100%; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      position: relative; z-index: 10;
    }

    .auth-card {
      width: 100%; max-width: 420px;
      background: linear-gradient(160deg, rgba(21,24,46,0.95), rgba(12,15,32,0.97));
      border: 1px solid rgba(141,145,255,0.18);
      border-radius: 22px;
      padding: 40px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .auth-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 800; color: #f1f5f9;
      margin-bottom: 32px;
    }
    .auth-brand-icon {
      width: 38px; height: 38px; border-radius: 11px;
      background: linear-gradient(135deg, #6d4aff, #4d33db);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      box-shadow: 0 4px 16px rgba(109,74,255,0.4);
    }

    .auth-title { font-size: 26px; font-weight: 800; color: #f1f5f9; margin-bottom: 6px; }
    .auth-sub { font-size: 13px; color: #475569; margin-bottom: 28px; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: #64748b; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 7px; }

    .form-input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; color: #f1f5f9; font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: #334155; }
    .form-input:focus {
      border-color: rgba(109,74,255,0.5);
      box-shadow: 0 0 0 3px rgba(109,74,255,0.12);
    }

    .error-box {
      display: none; padding: 11px 14px; border-radius: 10px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: #f87171; font-size: 13px; margin-bottom: 16px;
    }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6d4aff, #4d33db);
      border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 22px rgba(109,74,255,0.4);
      transition: all 0.2s; margin-top: 6px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(109,74,255,0.55); }

    .auth-footer { text-align: center; margin-top: 22px; font-size: 13px; color: #475569; }
    .auth-footer a { color: #a78bff; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { color: #c4b5fd; }

    .divider { display: flex; align-items: center; gap: 12px; margin: 22px 0; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.07); }
    .divider span { font-size: 11px; color: #334155; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }

    .feature-strip { display: flex; gap: 16px; margin-bottom: 28px; }
    .feature-pill {
      flex: 1; text-align: center; padding: 10px 8px;
      background: rgba(109,74,255,0.08); border: 1px solid rgba(109,74,255,0.18);
      border-radius: 10px; font-size: 11px; color: #94a3b8;
    }
    .feature-pill span { display: block; font-size: 18px; margin-bottom: 4px; }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">✦</div>
        RiskLens-AI
      </div>

      <div class="feature-strip">
        <div class="feature-pill"><span>📊</span>Live Markets</div>
        <div class="feature-pill"><span>🤖</span>AI Analysis</div>
        <div class="feature-pill"><span>🔒</span>Secure</div>
      </div>

      <div class="auth-title">Welcome back</div>
      <div class="auth-sub">Sign in to access your dashboard and AI tools.</div>

      <form id="login-form">
        <div class="form-group">
          <label for="login-email">Email Address</label>
          <input type="email" id="login-email" class="form-input" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" class="form-input" placeholder="Enter your password" required>
        </div>

        <div id="login-error" class="error-box"></div>

        <button type="submit" class="submit-btn" id="login-btn">Sign In →</button>
      </form>

      <div class="divider"><span>or</span></div>

      <div class="auth-footer">
        Don't have an account? <a href="/signup.html">Create one free</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
