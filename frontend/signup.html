<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign up for RiskLens-AI — AI-Powered Stock Analysis Platform">
  <title>Sign Up — RiskLens-AI</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; }

    .auth-page {
      width: 100%; min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px; position: relative; z-index: 10;
    }

    .auth-card {
      width: 100%; max-width: 440px;
      background: linear-gradient(160deg, rgba(21,24,46,0.95), rgba(12,15,32,0.97));
      border: 1px solid rgba(141,145,255,0.18);
      border-radius: 22px; padding: 40px 36px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), inset 0 0 0 1px rgba(255,255,255,0.03);
    }

    .auth-brand {
      display: flex; align-items: center; gap: 10px;
      font-size: 20px; font-weight: 800; color: #f1f5f9; margin-bottom: 28px;
    }
    .auth-brand-icon {
      width: 38px; height: 38px; border-radius: 11px;
      background: linear-gradient(135deg, #6d4aff, #4d33db);
      display: flex; align-items: center; justify-content: center; font-size: 18px;
      box-shadow: 0 4px 16px rgba(109,74,255,0.4);
    }

    .auth-title { font-size: 24px; font-weight: 800; color: #f1f5f9; margin-bottom: 5px; }
    .auth-sub { font-size: 13px; color: #475569; margin-bottom: 26px; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; font-weight: 700; color: #64748b; letter-spacing: .06em; text-transform: uppercase; margin-bottom: 7px; }

    .form-input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 12px; color: #f1f5f9; font-size: 14px;
      font-family: inherit; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input::placeholder { color: #334155; }
    .form-input:focus { border-color: rgba(109,74,255,0.5); box-shadow: 0 0 0 3px rgba(109,74,255,0.12); }

    /* Role selector */
    .role-selector { display: flex; gap: 10px; }
    .role-opt { flex: 1; }
    .role-opt input { display: none; }
    .role-label {
      display: block; text-align: center; padding: 12px 8px;
      border: 1px solid rgba(255,255,255,0.09); border-radius: 12px;
      background: rgba(255,255,255,0.03); cursor: pointer;
      font-size: 13px; color: #64748b; font-weight: 600;
      transition: all 0.2s;
    }
    .role-label .role-icon { font-size: 22px; display: block; margin-bottom: 5px; }
    .role-opt input:checked + .role-label {
      border-color: rgba(109,74,255,0.5);
      background: rgba(109,74,255,0.12); color: #a78bff;
    }

    .error-box {
      display: none; padding: 11px 14px; border-radius: 10px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.25);
      color: #f87171; font-size: 13px; margin-bottom: 16px;
    }

    .submit-btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #6d4aff, #4d33db);
      border: none; border-radius: 12px;
      color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 6px 22px rgba(109,74,255,0.4);
      transition: all 0.2s; margin-top: 8px;
    }
    .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(109,74,255,0.55); }

    .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: #475569; }
    .auth-footer a { color: #a78bff; text-decoration: none; font-weight: 600; }
    .auth-footer a:hover { color: #c4b5fd; }
  </style>
</head>
<body>
  <div class="bg-animation">
    <div class="orb"></div><div class="orb"></div><div class="orb"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-brand-icon">✦</div>
        RiskLens-AI
      </div>

      <div class="auth-title">Create your account</div>
      <div class="auth-sub">Join RiskLens AI — free forever, upgrade when you're ready.</div>

      <form id="signup-form">
        <!-- Role Selector -->
        <div class="form-group">
          <label>I am a…</label>
          <div class="role-selector">
            <div class="role-opt">
              <input type="radio" name="role" id="role-investor" value="investor" checked>
              <label class="role-label" for="role-investor">
                <span class="role-icon">💼</span>
                Investor
              </label>
            </div>
            <div class="role-opt">
              <input type="radio" name="role" id="role-founder" value="founder">
              <label class="role-label" for="role-founder">
                <span class="role-icon">💡</span>
                Founder
              </label>
            </div>
          </div>
        </div>

        <div class="form-group">
          <label for="signup-name">Full Name</label>
          <input type="text" id="signup-name" class="form-input" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="signup-email">Email Address</label>
          <input type="email" id="signup-email" class="form-input" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="signup-password">Password</label>
          <input type="password" id="signup-password" class="form-input" placeholder="Minimum 6 characters" minlength="6" required>
        </div>

        <!-- Conditional: Founder fields -->
        <div class="form-group" id="founder-fields" style="display:none;">
          <label for="startup-name">Company / Startup Name</label>
          <input type="text" id="startup-name" class="form-input" placeholder="Acme Corp">
        </div>

        <!-- Conditional: Investor fields -->
        <div class="form-group" id="investor-fields" style="display:none;">
          <label for="investment-budget">Investment Budget (optional)</label>
          <select id="investment-budget" class="form-input" style="background:#0d1124;">
            <option value="">Select a range</option>
            <option value="10k-50k">$10k – $50k</option>
            <option value="50k-250k">$50k – $250k</option>
            <option value="250k+">$250k+</option>
          </select>
        </div>

        <div id="signup-error" class="error-box"></div>
        <button type="submit" class="submit-btn" id="signup-btn">Create Account →</button>
      </form>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    // Role toggle logic
    document.querySelectorAll('input[name="role"]').forEach(input => {
      input.addEventListener('change', e => {
        const val = e.target.value;
        document.getElementById('founder-fields').style.display = val === 'founder' ? 'block' : 'none';
        document.getElementById('investor-fields').style.display = val === 'investor' ? 'block' : 'none';
      });
    });
  </script>
</body>
</html>
